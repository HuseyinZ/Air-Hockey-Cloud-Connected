services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8081:80"
    restart: unless-stopped
